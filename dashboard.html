<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验室内部控制台 | AIRBOT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
        body { background: #0a0e17; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* 左侧边栏 */
        .sidebar { width: 250px; background: #111827; border-right: 1px solid rgba(0, 212, 255, 0.2); padding: 20px 0; display: flex; flex-direction: column; }
        .logo-area { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; text-align: center; }
        .logo-area h2 { color: #00d4ff; font-size: 20px; cursor: pointer; }
        
        .menu-item { padding: 15px 25px; color: #a0aec0; cursor: pointer; transition: all 0.3s; font-size: 15px; }
        .menu-item:hover, .menu-item.active { background: rgba(0, 212, 255, 0.1); color: #00d4ff; border-right: 3px solid #00d4ff; }
        .logout-btn { margin-top: auto; padding: 15px 25px; color: #ff4d4f; cursor: pointer; transition: all 0.3s; }
        .logout-btn:hover { background: rgba(255, 77, 79, 0.1); }

        /* 右侧主区域 */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, rgba(0, 212, 255, 0.05), transparent 50%); }
        .card { background: rgba(17, 24, 39, 0.8); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 12px; padding: 30px; max-width: 600px; }
        .card h3 { margin-bottom: 20px; color: #00d4ff; font-size: 22px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #a0aec0; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 6px; color: white; transition: 0.3s; }
        .form-group input:focus { border-color: #00d4ff; outline: none; }
        
        .btn { padding: 12px 24px; background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; border-radius: 6px; color: #0a0e17; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3); }

        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; font-weight: bold; transform: translateX(150%); transition: 0.3s; z-index: 1000; }
        .notif-show { transform: translateX(0); }
    </style>
</head>
<body>

    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="logo-area" onclick="window.location.href='index.html'">
            <h2>NJIT-AIRBOT</h2>
            <p style="font-size: 12px; color: #666; margin-top: 5px;">返回官网首页</p>
        </div>
        <div class="menu-item active">👤 个人中心</div>
        <div class="menu-item" onclick="alert('即将迁移：此处可放入云打印模块')">🖨️ 实验室云打印</div>
        <div class="menu-item" onclick="alert('即将迁移：此处可放入机密资料下载')">📁 机密资料</div>
        <div class="logout-btn" onclick="doLogout()">🚪 安全退出</div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <h2 style="margin-bottom: 30px; font-weight: 300;">欢迎回来，<span id="welcomeName" style="color: #00d4ff; font-weight: bold;">加载中...</span></h2>
        
        <div class="card">
            <h3>资料绑定与修改</h3>
            <form id="profileForm">
                <div class="form-group">
                    <label>关联学号</label>
                    <input type="text" id="studentId" placeholder="请输入您的学号">
                </div>
                <div class="form-group">
                    <label>联系手机</label>
                    <input type="tel" id="phone" placeholder="请输入11位手机号">
                </div>
                <div class="form-group">
                    <label>内部邮箱</label>
                    <input type="email" id="email" placeholder="请输入常用邮箱">
                </div>
                <button type="submit" class="btn" id="saveBtn">保存修改</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://api.airbot.top/api";
        
        // 1. 验证是否登录
        const rawUser = localStorage.getItem("lab_currentUser");
        if (!rawUser) {
            window.location.href = "index.html"; // 没登录直接踢回首页
        }
        const currentUser = JSON.parse(rawUser);
        document.getElementById("welcomeName").textContent = currentUser.username;

        // 2. 加载个人信息
        async function loadProfile() {
            try {
                const response = await fetch(`${API_BASE_URL}/user/profile`, {
                    headers: { 'Authorization': `Bearer ${currentUser.token}` }
                });
                if (response.ok) {
                    const res = await response.json();
                    document.getElementById("studentId").value = res.data.student_id || "";
                    document.getElementById("phone").value = res.data.phone || "";
                    document.getElementById("email").value = res.data.email || "";
                } else if (response.status === 401) {
                    doLogout(); // Token 过期
                }
            } catch (e) {
                console.error("加载信息失败", e);
            }
        }
        loadProfile();

        // 3. 提交修改表单
        document.getElementById("profileForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById("saveBtn");
            saveBtn.textContent = "保存中...";
            
            const payload = {
                student_id: document.getElementById("studentId").value,
                phone: document.getElementById("phone").value,
                email: document.getElementById("email").value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/user/profile`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    showToast("个人信息保存成功！", "#00ff88", "#0a0e17");
                } else {
                    showToast("保存失败，请检查网络", "#ff4d4f", "white");
                }
            } catch (error) {
                showToast("服务器连接异常", "#ff4d4f", "white");
            } finally {
                saveBtn.textContent = "保存修改";
            }
        });

        // 4. 退出登录
        function doLogout() {
            localStorage.removeItem("lab_currentUser");
            window.location.href = "index.html";
        }

        // 简易提示框
        function showToast(msg, bg, color) {
            const toast = document.createElement("div");
            toast.className = "notification notif-show";
            toast.style.background = bg;
            toast.style.color = color;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => { toast.classList.remove("notif-show"); setTimeout(() => toast.remove(), 300); }, 2500);
        }
    </script>
</body>
</html>
