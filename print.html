<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIRBOT 自助打印</title>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #0b1018;
            color: #f8fafc;
            line-height: 1.6;
        }
        .shell { width: min(760px, 100%); margin: 0 auto; padding: 18px 14px 34px; }
        .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
        .topbar img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        .brand { font-weight: 800; color: #56d7ff; letter-spacing: .2px; }
        .sub { color: #9aa8bc; font-size: 13px; }
        .panel {
            background: #121a27;
            border: 1px solid rgba(86, 215, 255, .22);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 14px 34px rgba(0, 0, 0, .28);
        }
        h1 { font-size: 26px; line-height: 1.2; margin-bottom: 8px; }
        h2 { font-size: 18px; margin-bottom: 12px; color: #56d7ff; }
        .muted { color: #a8b3c3; font-size: 14px; }
        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }
        .price {
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 8px;
            padding: 12px;
            background: rgba(255,255,255,.035);
        }
        .price strong { display: block; font-size: 22px; color: #ffffff; }
        form { display: grid; gap: 14px; }
        label { display: grid; gap: 7px; color: #dbe7f6; font-size: 14px; }
        input, select, textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,.16);
            background: #0b111b;
            color: #f8fafc;
            border-radius: 8px;
            padding: 13px 12px;
            font-size: 16px;
            outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: #56d7ff; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            border: none;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            background: #56d7ff;
            color: #061018;
        }
        .btn.secondary { background: transparent; color: #56d7ff; border: 1px solid #56d7ff; }
        .btn:disabled { opacity: .55; cursor: not-allowed; }
        .result { display: none; }
        .result.active { display: block; }
        .order-line {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 9px 0;
            border-bottom: 1px solid rgba(255,255,255,.08);
            font-size: 14px;
        }
        .order-line span:first-child { color: #9aa8bc; }
        .order-line span:last-child { text-align: right; font-weight: 700; }
        .total { font-size: 26px; color: #61f0a8; }
        .pay-box {
            display: grid;
            grid-template-columns: 132px 1fr;
            gap: 14px;
            align-items: center;
            margin: 16px 0;
            padding: 12px;
            background: rgba(255,255,255,.04);
            border-radius: 8px;
        }
        .pay-box img { width: 132px; height: 132px; border-radius: 6px; object-fit: cover; background: #fff; }
        .notice {
            padding: 10px 12px;
            border-left: 3px solid #ffca66;
            background: rgba(255, 202, 102, .08);
            color: #ffe1a5;
            font-size: 13px;
            margin-top: 10px;
        }
        .toast {
            position: fixed;
            left: 14px;
            right: 14px;
            bottom: 16px;
            padding: 13px 14px;
            border-radius: 8px;
            background: #56d7ff;
            color: #061018;
            font-weight: 800;
            text-align: center;
            transform: translateY(130%);
            transition: .25s ease;
            z-index: 10;
        }
        .toast.show { transform: translateY(0); }
        @media (max-width: 560px) {
            .shell { padding-top: 14px; }
            h1 { font-size: 24px; }
            .row, .price-grid, .pay-box { grid-template-columns: 1fr; }
            .pay-box img { width: 180px; height: 180px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="topbar">
            <img src="picture/logo.png" alt="AIRBOT">
            <div>
                <div class="brand">NJIT-AIRBOT</div>
                <div class="sub">自助付费打印通道</div>
            </div>
        </div>

        <section class="panel">
            <h1>上传文件，付款后由管理员确认打印</h1>
            <p class="muted">支持 Word、PDF、JPG、PNG。文件会在后端保留原件和可打印 PDF 备份，便于处理异常和核对纠纷。</p>
            <div class="price-grid">
                <div class="price"><span class="muted">黑白</span><strong>0.25 元/页</strong></div>
                <div class="price"><span class="muted">彩色</span><strong>0.35 元/页</strong></div>
            </div>
        </section>

        <section class="panel" id="orderPanel">
            <h2>打印信息</h2>
            <form id="orderForm">
                <label>打印文件
                    <input type="file" id="printFile" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/jpeg,image/png" required>
                </label>
                <button id="wechatDocBtn" class="btn secondary" style="display:none;" onclick="chooseWechatDoc()">📄 选择文档 (PDF/Word)</button>
                <button id="wechatImageBtn" class="btn secondary" style="display:none;" onclick="chooseWechatImage()">�️ 选择图片</button>
                <div id="selectedFileName" style="font-size:13px;color:#56d7ff;margin-top:6px;display:none;"></div>
                <div class="row">
                    <label>打印颜色
                        <select id="colorMode">
                            <option value="black_white">黑白打印</option>
                            <option value="color">彩色打印</option>
                        </select>
                    </label>
                    <label>单双面
                        <select id="printMode">
                            <option value="single">单面</option>
                            <option value="duplex">双面</option>
                        </select>
                    </label>
                </div>
                <label>份数
                    <input type="number" id="copies" min="1" max="20" value="1" required>
                </label>
                <div class="row">
                    <label>姓名
                        <input type="text" id="customerName" maxlength="30" placeholder="用于取件核对" required>
                    </label>
                    <label>手机号
                        <input type="tel" id="customerPhone" maxlength="20" placeholder="打印异常时联系" required>
                    </label>
                </div>
                <button class="btn" id="submitBtn" type="submit">生成订单并计算价格</button>
            </form>
        </section>

        <section class="panel result" id="resultPanel">
            <h2>订单与付款</h2>
            <div id="orderSummary"></div>
            <div class="pay-box">
                <img src="picture/QR.jpg" alt="收款二维码">
                <div>
                    <p class="muted">请按订单金额付款，并在付款备注中填写订单号。管理员核对到账后会在控制台确认打印。</p>
                    <div class="notice">当前是人工确认模式，提交“我已付款”不代表已经开始打印。</div>
                </div>
            </div>
            <form id="paidForm">
                <label>付款备注
                    <textarea id="paymentNote" rows="3" placeholder="例如：微信已付，付款昵称/尾号/时间"></textarea>
                </label>
                <button class="btn" id="paidBtn" type="submit">我已付款，提交管理员确认</button>
                <button class="btn secondary" type="button" onclick="location.reload()">重新下单</button>
            </form>
        </section>
    </main>
    <div class="toast" id="toast"></div>

    <script>
        const API_BASE_URL = "https://api.airbot.top/api";
        let currentOrderNo = "";
        let wechatSelectedFile = null;
        let wechatUploadedFileId = null;

        function showToast(message, isError = false) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.style.background = isError ? "#ff5d67" : "#56d7ff";
            toast.style.color = isError ? "#fff" : "#061018";
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2600);
        }

        function colorText(value) {
            return value === "color" ? "彩色" : "黑白";
        }

        function modeText(value) {
            return value === "duplex" ? "双面" : "单面";
        }

        function statusText(value) {
            const map = {
                pending_payment: "待付款",
                paid_submitted: "待管理员确认",
                printing: "打印中",
                printed: "已打印",
                failed: "打印失败",
                cancelled: "已取消"
            };
            return map[value] || value;
        }

        function renderOrder(order) {
            currentOrderNo = order.order_no;
            document.getElementById("orderSummary").innerHTML = `
                <div class="order-line"><span>订单号</span><span>${order.order_no}</span></div>
                <div class="order-line"><span>文件</span><span>${order.original_filename}</span></div>
                <div class="order-line"><span>页数</span><span>${order.page_count} 页</span></div>
                <div class="order-line"><span>设置</span><span>${colorText(order.color_mode)} / ${modeText(order.print_mode)} / ${order.copies} 份</span></div>
                <div class="order-line"><span>单价</span><span>${order.unit_price.toFixed(2)} 元/页</span></div>
                <div class="order-line"><span>状态</span><span>${statusText(order.status)}</span></div>
                <div class="order-line"><span>应付金额</span><span class="total">${order.total_price.toFixed(2)} 元</span></div>
            `;
            document.getElementById("resultPanel").classList.add("active");
            document.getElementById("resultPanel").scrollIntoView({ behavior: "smooth", block: "start" });
        }

        document.getElementById("orderForm").addEventListener("submit", async (event) => {
            event.preventDefault();
            const fileInput = document.getElementById("printFile");
            let selectedFile = wechatSelectedFile || (fileInput.files.length ? fileInput.files[0] : null);
            
            if (!selectedFile) {
                showToast("请选择要打印的文件", true);
                return;
            }
            if (selectedFile.size > 30 * 1024 * 1024) {
                showToast("文件不能超过30MB", true);
                return;
            }

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.textContent = "正在上传并解析页数...";

            const fd = new FormData();
            fd.append("file", selectedFile);
            fd.append("customer_name", document.getElementById("customerName").value.trim());
            fd.append("customer_phone", document.getElementById("customerPhone").value.trim());
            fd.append("color_mode", document.getElementById("colorMode").value);
            fd.append("print_mode", document.getElementById("printMode").value);
            fd.append("copies", document.getElementById("copies").value);

            try {
                const res = await fetch(`${API_BASE_URL}/public/print-orders`, { method: "POST", body: fd });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "订单创建失败");
                renderOrder(data.data);
                showToast("订单已生成，请按金额付款");
            } catch (error) {
                showToast(error.message || "上传失败", true);
            } finally {
                btn.disabled = false;
                btn.textContent = "生成订单并计算价格";
            }
        });

        document.getElementById("paidForm").addEventListener("submit", async (event) => {
            event.preventDefault();
            if (!currentOrderNo) return;
            const btn = document.getElementById("paidBtn");
            btn.disabled = true;
            btn.textContent = "正在提交...";
            const fd = new FormData();
            fd.append("payment_note", document.getElementById("paymentNote").value.trim());
            try {
                const res = await fetch(`${API_BASE_URL}/public/print-orders/${currentOrderNo}/paid`, {
                    method: "POST",
                    body: fd
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "提交失败");
                renderOrder(data.data);
                showToast("已提交付款确认，请等待管理员处理");
            } catch (error) {
                showToast(error.message || "提交失败", true);
            } finally {
                btn.disabled = false;
                btn.textContent = "我已付款，提交管理员确认";
            }
        });

        async function initWechatSDK() {
            if (!/MicroMessenger/i.test(navigator.userAgent)) {
                console.log("非微信环境，跳过微信 SDK 初始化");
                return;
            }
            console.log("检测到微信环境，开始初始化 JS-SDK");
            
            try {
                const currentUrl = window.location.href.split('#')[0];
                console.log("当前页面 URL:", currentUrl);
                const url = encodeURIComponent(currentUrl);
                const res = await fetch(`${API_BASE_URL}/public/wechat-signature?url=${url}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "获取微信签名失败");
                
                console.log("获取签名成功:", data.data);
                
                wx.config({
                    debug: true,
                    appId: data.data.appId,
                    timestamp: parseInt(data.data.timestamp),
                    nonceStr: data.data.nonceStr,
                    signature: data.data.signature,
                    jsApiList: ["chooseMessageFile", "chooseImage", "getLocalImgData"]
                });
                
                wx.ready(function() {
                    console.log("微信 JS-SDK 初始化成功");
                    document.getElementById("wechatDocBtn").style.display = "block";
                    document.getElementById("wechatImageBtn").style.display = "block";
                    showToast("微信文件选择已就绪");
                });
                
                wx.error(function(res) {
                    console.error("微信 JS-SDK 初始化失败:", res);
                    showToast("微信功能初始化失败: " + res.errMsg, true);
                });
            } catch (error) {
                console.error("初始化微信 SDK 出错:", error);
                showToast("微信功能初始化失败: " + error.message, true);
            }
        }

        function chooseWechatDoc() {
            console.log("点击了微信文档选择按钮");
            if (!window.wx) {
                showToast("微信 SDK 未加载", true);
                return;
            }
            
            wx.chooseMessageFile({
                count: 1,
                type: "file",
                success: function(res) {
                    console.log("chooseMessageFile 成功:", res);
                    const file = res.tempFiles[0];
                    console.log("选中文件:", file);
                    
                    wx.uploadFile({
                        url: `${API_BASE_URL}/public/wechat-upload`,
                        filePath: file.localId || file.path,
                        name: 'file',
                        formData: {
                            'filename': file.name
                        },
                        success: async function(uploadRes) {
                            console.log("wx.uploadFile 成功:", uploadRes);
                            try {
                                const data = JSON.parse(uploadRes.data);
                                if (data.code === 200) {
                                    wechatUploadedFileId = data.data.file_id;
                                    const downloadUrl = `${API_BASE_URL}/public/wechat-upload/${data.data.file_id}`;
                                    const response = await fetch(downloadUrl);
                                    const blob = await response.blob();
                                    wechatSelectedFile = new File([blob], data.data.filename, { type: blob.type });
                                    
                                    document.getElementById("selectedFileName").textContent = "已选择: " + data.data.filename;
                                    document.getElementById("selectedFileName").style.display = "block";
                                    showToast("文件选择成功");
                                } else {
                                    showToast("文件上传失败", true);
                                }
                            } catch (error) {
                                console.error("解析上传结果失败:", error);
                                showToast("文件处理失败", true);
                            }
                        },
                        fail: function(err) {
                            console.error("wx.uploadFile 失败:", err);
                            showToast("文件上传失败: " + err.errMsg, true);
                        }
                    });
                },
                fail: function(res) {
                    console.error("chooseMessageFile 失败:", res);
                    if (res.errMsg && res.errMsg.indexOf("cancel") === -1) {
                        showToast("文件选择失败: " + res.errMsg, true);
                    }
                }
            });
        }

        function chooseWechatImage() {
            console.log("点击了微信图片选择按钮");
            if (!window.wx) {
                showToast("微信 SDK 未加载", true);
                return;
            }
            
            wx.chooseImage({
                count: 1,
                sizeType: ['original', 'compressed'],
                sourceType: ['album', 'camera'],
                success: function(res) {
                    console.log("chooseImage 成功:", res);
                    const localId = res.localIds[0];
                    
                    wx.uploadFile({
                        url: `${API_BASE_URL}/public/wechat-upload`,
                        filePath: localId,
                        name: 'file',
                        formData: {
                            'filename': 'image_' + Date.now() + '.jpg'
                        },
                        success: async function(uploadRes) {
                            console.log("wx.uploadFile 成功:", uploadRes);
                            try {
                                const data = JSON.parse(uploadRes.data);
                                if (data.code === 200) {
                                    wechatUploadedFileId = data.data.file_id;
                                    const downloadUrl = `${API_BASE_URL}/public/wechat-upload/${data.data.file_id}`;
                                    const response = await fetch(downloadUrl);
                                    const blob = await response.blob();
                                    wechatSelectedFile = new File([blob], data.data.filename, { type: blob.type });
                                    
                                    document.getElementById("selectedFileName").textContent = "已选择: 图片";
                                    document.getElementById("selectedFileName").style.display = "block";
                                    showToast("图片选择成功");
                                } else {
                                    showToast("图片上传失败", true);
                                }
                            } catch (error) {
                                console.error("解析上传结果失败:", error);
                                showToast("图片处理失败", true);
                            }
                        },
                        fail: function(err) {
                            console.error("wx.uploadFile 失败:", err);
                            showToast("图片上传失败: " + err.errMsg, true);
                        }
                    });
                },
                fail: function(res) {
                    console.error("chooseImage 失败:", res);
                    if (res.errMsg && res.errMsg.indexOf("cancel") === -1) {
                        showToast("图片选择失败: " + res.errMsg, true);
                    }
                }
            });
        }

        document.getElementById("printFile").addEventListener("change", function() {
            if (this.files.length > 0) {
                wechatSelectedFile = null;
                document.getElementById("selectedFileName").style.display = "none";
            }
        });

        initWechatSDK();
    </script>
</body>
</html>
